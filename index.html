<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>jOYA</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%237C5CBF'/><text y='.9em' font-size='60' x='10' fill='white' font-family='sans-serif' font-weight='bold'>j</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    :root{
      --p:#7C5CBF;--pl:#F3EEFF;--pm:#C4ADEE;--pd:#6A4DAD;
      --bg:#F5F4F9;--white:#fff;
      --ink:#111;--ink2:#555;--ink3:#999;
      --b:rgba(0,0,0,0.08);--b2:rgba(0,0,0,0.06);
      --green:#1A7A4A;--gbg:#EDFAF3;
      --amber:#8A5A00;--abg:#FFF8EC;
      --teal:#1A6B5A;--tbg:#EDFAF5;
      --red:#A32020;
      --r:16px;
    }
    html,body{min-height:100%}
    body{font-family:'Noto Sans KR',sans-serif;background:var(--bg);color:var(--ink);max-width:480px;margin:0 auto}

    /* ── TOP CARD (header + tabs + input) ── */
    .top-card{background:var(--white);border-radius:0 0 20px 20px;padding:14px 16px 16px;border:0.5px solid var(--b);margin-bottom:12px;position:sticky;top:0;z-index:20;box-shadow:0 2px 12px rgba(0,0,0,0.06)}
    .hd-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
    .hd-name{font-family:'DM Sans',sans-serif;font-weight:500;font-size:20px;color:var(--p);letter-spacing:-0.5px}
    .hd-sub{font-size:11px;color:var(--ink3);margin-top:1px}
    .hd-ver{font-size:10px;color:var(--pm);background:var(--pl);padding:3px 9px;border-radius:100px;font-family:'DM Sans',sans-serif}

    /* pill tabs */
    .tabs{display:flex;background:#F0EDF9;border-radius:100px;padding:3px;margin-bottom:12px}
    .tab{flex:1;padding:9px 6px;border:none;background:none;font-size:13px;font-weight:500;color:var(--ink3);font-family:'Noto Sans KR',sans-serif;cursor:pointer;border-radius:100px;transition:all 0.18s;white-space:nowrap;text-align:center}
    .tab.on{background:var(--p);color:white}

    /* textarea input */
    .inp-box{background:#FAFAFA;border:1.5px solid var(--b);border-radius:14px;padding:12px 14px;transition:border-color 0.2s,box-shadow 0.2s}
    .inp-box:focus-within{border-color:var(--p);box-shadow:0 0 0 3px rgba(124,92,191,0.1)}
    .inp-box.err{border-color:var(--red)}
    textarea{width:100%;min-height:48px;border:none;outline:none;font-size:15px;font-family:'Noto Sans KR',sans-serif;color:var(--ink);background:transparent;resize:none;line-height:1.65;overflow:hidden}
    textarea::placeholder{color:var(--ink3);font-weight:300}
    .inp-foot{display:flex;align-items:center;justify-content:space-between;margin-top:10px;gap:8px}
    .inp-left{display:flex;flex-direction:column;gap:2px}
    .inp-hint{font-size:11px;color:var(--ink3)}
    .limit-msg{font-size:11px;color:var(--red);display:none}
    .btn-go{padding:10px 22px;background:var(--p);color:white;border:none;border-radius:100px;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(124,92,191,0.35);display:flex;align-items:center;gap:6px;flex-shrink:0;transition:all 0.18s}
    .btn-go:active{transform:scale(0.97)}
    .btn-go:disabled{background:#ccc;box-shadow:none;cursor:default;transform:none}
    .spin{width:14px;height:14px;border:2px solid rgba(255,255,255,0.3);border-top-color:white;border-radius:50%;animation:spin 0.7s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}

    /* conj input */
    .conj-row{display:flex;gap:8px}
    .conj-row input{flex:1;padding:11px 16px;border:1.5px solid var(--b);border-radius:100px;font-size:14px;font-family:'Noto Sans KR',sans-serif;outline:none;color:var(--ink);background:#FAFAFA;transition:border-color 0.2s}
    .conj-row input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(26,107,90,0.08)}
    .btn-conj{padding:11px 22px;background:var(--teal);color:white;border:none;border-radius:100px;font-size:13px;font-weight:500;font-family:'Noto Sans KR',sans-serif;cursor:pointer;box-shadow:0 2px 8px rgba(26,107,90,0.3);white-space:nowrap;transition:all 0.18s}
    .btn-conj:active{transform:scale(0.97)}
    .btn-conj:disabled{background:#ccc;box-shadow:none;cursor:default}
    .conj-hint{font-size:11px;color:var(--ink3);margin-top:8px}

    /* ── PANELS ── */
    .panel{display:none;padding:0 16px 80px}
    .panel.on{display:block}

    /* ── RESULT CARD ── */
    .result-card{background:var(--white);border-radius:var(--r);border:0.5px solid var(--b);overflow:hidden}
    .sec{padding:14px 16px;border-bottom:1px solid var(--b2)}
    .sec:last-child{border-bottom:none}
    .sec-hd{display:flex;align-items:center;gap:6px;margin-bottom:10px}
    .sec-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
    .sec-lbl{font-size:11px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
    .dot-p{background:var(--p)}.lbl-p{color:var(--p)}
    .dot-g{background:var(--green)}.lbl-g{color:var(--green)}
    .dot-a{background:var(--amber)}.lbl-a{color:var(--amber)}
    .dot-t{background:var(--teal)}.lbl-t{color:var(--teal)}

    .trans-text{font-size:15px;color:var(--ink);line-height:1.7;white-space:pre-wrap;word-break:break-word}
    .ph{color:var(--ink3);font-size:13px;font-style:italic}
    .err-txt{color:var(--red);font-size:13px}

    /* native box */
    .native-box{background:var(--pl);border-radius:10px;padding:10px 12px;margin-top:10px}
    .native-lbl{font-size:11px;color:#9B7FD4;font-weight:600;margin-bottom:4px}
    .native-txt{font-size:14px;color:var(--pd);font-style:italic;line-height:1.6;margin-bottom:2px;white-space:pre-wrap}
    .native-sub{font-size:11px;color:var(--ink3)}

    /* correction */
    .ok-line{display:flex;align-items:center;gap:8px;color:var(--green);font-weight:500;font-size:14px;margin-bottom:8px}
    .ok-icon{width:20px;height:20px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-size:11px;flex-shrink:0}
    .chip{display:inline-block;font-size:10px;font-weight:600;text-transform:uppercase;padding:2px 8px;border-radius:5px;margin-bottom:3px}
    .chip-err{background:#FFF0F0;color:var(--red)}
    .chip-fix{background:var(--gbg);color:var(--green)}
    .chip-desc{background:#EDF4FF;color:#185FA5}
    .chip-res{background:var(--pl);color:var(--p)}
    .cv{font-size:14px;line-height:1.6;color:var(--ink);margin-bottom:6px;padding-left:2px;white-space:pre-wrap;word-break:break-word}
    .sep{border:none;border-top:1px solid var(--b2);margin:8px 0}

    /* grammar */
    .gram-list{display:flex;flex-direction:column;gap:8px}
    .gram-item{display:flex;gap:10px;align-items:flex-start}
    .gram-tag{font-size:10px;font-weight:600;padding:3px 8px;border-radius:5px;background:var(--abg);color:var(--amber);white-space:nowrap;flex-shrink:0;margin-top:1px}
    .gram-desc{font-size:13px;color:var(--ink2);line-height:1.6}

    /* mini conjugation */
    .mini-conj{margin-top:12px;padding-top:12px;border-top:1px solid var(--b2)}
    .mini-lbl{font-size:11px;color:var(--ink3);margin-bottom:6px}
    .mini-grid{display:grid;grid-template-columns:1fr 1fr;gap:4px}
    .mini-cell{display:flex;justify-content:space-between;align-items:center;background:#FAFAFA;border:1px solid var(--b);border-radius:7px;padding:5px 9px}
    .mini-pro{font-size:11px;color:var(--ink3)}
    .mini-form{font-size:13px;font-weight:500;color:var(--p);font-family:'DM Sans',sans-serif}

    /* ── CONJ TAB ── */
    .conj-card{background:var(--white);border-radius:var(--r);border:0.5px solid var(--b);overflow:hidden}
    .conj-hd{padding:16px 16px 12px;border-bottom:1px solid var(--b2)}
    .conj-name{font-family:'DM Sans',monospace;font-size:26px;font-weight:500;color:var(--ink);letter-spacing:-0.5px}
    .conj-type{font-size:12px;color:var(--ink3);margin-top:2px}
    .conj-meanings{display:flex;gap:6px;margin-top:10px;flex-wrap:wrap}
    .conj-badge{background:var(--tbg);color:var(--teal);font-size:13px;font-weight:500;padding:4px 12px;border-radius:100px;border:1px solid rgba(26,107,90,0.15)}
    .conj-nf{display:flex;gap:24px;margin-top:12px;padding-top:10px;border-top:1px solid var(--b2)}
    .nf-item{display:flex;align-items:center;gap:8px}
    .nf-lbl{font-size:10px;font-weight:600;color:var(--ink3);text-transform:uppercase;letter-spacing:0.04em}
    .nf-form{font-size:15px;font-weight:500;color:var(--teal);font-family:'DM Sans',sans-serif}

    /* tense block */
    .tense-wrap{border-bottom:1px solid var(--b2)}
    .tense-wrap:last-child{border-bottom:none}
    .tense-hd{padding:11px 16px 8px;display:flex;align-items:center;gap:8px;cursor:pointer;user-select:none}
    .tense-badge{font-size:10px;font-weight:600;padding:3px 10px;border-radius:100px;background:var(--teal);color:white}
    .tense-name{font-size:12px;color:var(--ink3)}
    .tense-arrow{font-size:11px;color:var(--ink3);margin-left:auto;transition:transform 0.2s}
    .tense-arrow.open{transform:rotate(180deg)}
    .tense-grid{padding:0 16px 10px;display:grid;grid-template-columns:1fr 1fr;gap:4px 10px}
    .tense-cell{display:flex;justify-content:space-between;align-items:center;background:#FAFAFA;border:1px solid var(--b);border-radius:7px;padding:5px 9px}
    .tense-pro{font-size:11px;color:var(--ink3)}
    .tense-form{font-size:13px;font-weight:500;color:var(--teal);font-family:'DM Sans',sans-serif}
    .tense-body{display:none}
    .tense-body.open{display:block}
  </style>
</head>
<body>

<div class="top-card">
  <div class="hd-row">
    <div>
      <div class="hd-name">jOYA</div>
      <div class="hd-sub">스페인어 번역기</div>
    </div>
    <span class="hd-ver">v1.1 &middot; 20260510</span>
  </div>

  <div class="tabs">
    <button class="tab on" id="tab-es" onclick="switchTab('es')">ES 스페인어</button>
    <button class="tab" id="tab-ko" onclick="switchTab('ko')">KR 한국어</button>
    <button class="tab" id="tab-conj" onclick="switchTab('conj')">동사표</button>
  </div>

  <!-- ES input -->
  <div id="inp-es">
    <div class="inp-box" id="wrap-es">
      <textarea id="ta-es" placeholder="스페인어 문장을 입력하세요" rows="2"></textarea>
    </div>
    <div class="inp-foot">
      <div class="inp-left">
        <span class="inp-hint">Enter 번역 &middot; Shift+Enter 줄바꿈 &middot; 최대 5줄</span>
        <span class="limit-msg" id="limit-es">최대 5줄까지 입력 가능해요</span>
      </div>
      <button class="btn-go" id="btn-es" onclick="doTranslate('es')">번역</button>
    </div>
  </div>

  <!-- KO input -->
  <div id="inp-ko" style="display:none">
    <div class="inp-box" id="wrap-ko">
      <textarea id="ta-ko" placeholder="한국어 문장을 입력하세요" rows="2"></textarea>
    </div>
    <div class="inp-foot">
      <div class="inp-left">
        <span class="inp-hint">Enter 번역 &middot; Shift+Enter 줄바꿈 &middot; 최대 5줄</span>
        <span class="limit-msg" id="limit-ko">최대 5줄까지 입력 가능해요</span>
      </div>
      <button class="btn-go" id="btn-ko" onclick="doTranslate('ko')">번역</button>
    </div>
  </div>

  <!-- CONJ input -->
  <div id="inp-conj" style="display:none">
    <div class="conj-row">
      <input type="text" id="conj-input" placeholder="동사 원형 (예: hablar, ser, tener)" />
      <button class="btn-conj" id="btn-conj" onclick="doConjugate()">변환</button>
    </div>
    <div class="conj-hint">스페인어 동사 원형을 입력하면 시제별 변환표를 보여드려요</div>
  </div>
</div>

<!-- ES 패널 -->
<div class="panel on" id="panel-es">
  <div id="result-es" style="display:none">
    <div class="result-card">
      <div class="sec">
        <div class="sec-hd"><span class="sec-dot dot-p"></span><span class="sec-lbl lbl-p">해석</span></div>
        <div class="trans-text" id="r-trans-es"><span class="ph">번역 결과가 여기 표시됩니다</span></div>
      </div>
      <div class="sec">
        <div class="sec-hd"><span class="sec-dot dot-g"></span><span class="sec-lbl lbl-g">교정 &amp; 자연스러운 표현</span></div>
        <div id="r-corr-es"><span class="ph">로딩 중...</span></div>
      </div>
      <div class="sec">
        <div class="sec-hd"><span class="sec-dot dot-a"></span><span class="sec-lbl lbl-a">문법 포인트</span></div>
        <div id="r-gram-es"><span class="ph">로딩 중...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- KO 패널 -->
<div class="panel" id="panel-ko">
  <div id="result-ko" style="display:none">
    <div class="result-card">
      <div class="sec">
        <div class="sec-hd"><span class="sec-dot dot-p"></span><span class="sec-lbl lbl-p">스페인어 번역</span></div>
        <div class="trans-text" id="r-trans-ko"><span class="ph">번역 결과가 여기 표시됩니다</span></div>
        <div id="r-native-ko"></div>
      </div>
      <div class="sec">
        <div class="sec-hd"><span class="sec-dot dot-a"></span><span class="sec-lbl lbl-a">문법 포인트</span></div>
        <div id="r-gram-ko"><span class="ph">로딩 중...</span></div>
      </div>
    </div>
  </div>
</div>

<!-- 동사 변환표 패널 -->
<div class="panel" id="panel-conj">
  <div id="conj-result"></div>
</div>

<script>
var MAX_LINES = 5;
var RULE = 'Korean Hangul only in all Korean fields. No Chinese or Japanese characters.\n';

function dedupText(t) {
  if (!t) return t;
  t = t.replace(/\\n/g, '\n').trim();
  var lines = t.split('\n');
  // 정확히 절반으로 반복되는 경우 제거
  var half = Math.floor(lines.length / 2);
  if (half >= 1) {
    var first = lines.slice(0, half).join('\n').trim();
    var second = lines.slice(-half).join('\n').trim();
    if (first === second) return first;
  }
  // 문자열이 반으로 나뉘어 반복되는 경우
  var mid = Math.floor(t.length / 2);
  if (t.slice(0, mid).trim() === t.slice(mid).trim()) return t.slice(0, mid).trim();
  return t;
}

function switchTab(t) {
  ['es','ko','conj'].forEach(function(id) {
    document.getElementById('tab-' + id).classList.toggle('on', id === t);
    document.getElementById('panel-' + id).classList.toggle('on', id === t);
    document.getElementById('inp-' + id).style.display = id === t ? 'block' : 'none';
  });
}

function setupTA(id) {
  var ta = document.getElementById(id);
  var mode = id === 'ta-es' ? 'es' : 'ko';
  ta.addEventListener('input', function() {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
    var over = ta.value.split('\n').length > MAX_LINES;
    document.getElementById('wrap-' + mode).classList.toggle('err', over);
    document.getElementById('limit-' + mode).style.display = over ? 'block' : 'none';
  });
  ta.addEventListener('keydown', function(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTranslate(mode); }
  });
}
setupTA('ta-es');
setupTA('ta-ko');
document.getElementById('conj-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') doConjugate();
});

function setHTML(id, h) { document.getElementById(id).innerHTML = h; }
function setText(id, t) { document.getElementById(id).textContent = t; }

async function callOnce(prompt, input) {
  var ctrl = new AbortController();
  var timer = setTimeout(function() { ctrl.abort(); }, 15000);
  try {
    var resp = await fetch('/.netlify/functions/translate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: prompt, messages: [{ role: 'user', content: input }] }),
      signal: ctrl.signal
    });
    clearTimeout(timer);
    var data = await resp.json();
    if (data.error) throw new Error(data.error);
    var txt = data.content.map(function(b) { return b.text || ''; }).join('');
    var s = txt.indexOf('{');
    if (s === -1) throw new Error('응답 오류');
    txt = txt.substring(s);
    txt = txt.replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
    var depth = 0, end = -1;
    for (var i = 0; i < txt.length; i++) {
      if (txt[i] === '{') depth++;
      else if (txt[i] === '}') { depth--; if (depth === 0) { end = i; break; } }
    }
    if (end === -1) throw new Error('응답 오류');
    return JSON.parse(txt.substring(0, end + 1));
  } catch(e) {
    clearTimeout(timer);
    if (e.name === 'AbortError') throw new Error('시간 초과');
    throw e;
  }
}

async function callAPI(prompt, input) {
  var lastErr;
  for (var i = 0; i < 3; i++) {
    try { return await callOnce(prompt, input); }
    catch(e) {
      lastErr = e;
      if (i < 2) await new Promise(function(r) { setTimeout(r, 1000 * (i + 1)); });
    }
  }
  throw new Error(lastErr.message);
}

function getESPrompt(text) {
  return RULE +
    'Spanish tutor for Korean learners. JSON only, no markdown.\n' +
    'Translate ALL lines of this Spanish text to Korean completely. Do not skip any sentence. Preserve line breaks with \\n.\n' +
    'Analyze this Spanish text:\n' +
    '{"translation":"한국어번역(줄바꿈유지)",' +
    '"correction":{"is_correct":true,"errors":[{"error":"오류","fix":"수정","desc":"이유"}],"result":"교정문","native_tip":"표현차이설명(20자이내,실제내용만)","native_text":"원어민ES표현","native_sub":"한국어설명20자이내"},' +
    '"grammar":[{"tag":"문법유형 (예: 날씨표현 · hace frio)","desc":"한국어설명"},{"tag":"시제 (예: 현재형 · habla)","desc":"한국어설명"},{"tag":"표현법 (예: 접속사 · que)","desc":"한국어설명"}],' +
    '"key_verb":{"infinitive":"ES원형","meaning":"한국어뜻","conjugations":[{"pronoun":"yo","form":""},{"pronoun":"tú","form":""},{"pronoun":"él/ella","form":""},{"pronoun":"nosotros","form":""},{"pronoun":"vosotros","form":""},{"pronoun":"ellos","form":""}]}}\n' +
    'Spanish: ' + text;
}

function getKOPrompt(text) {
  return 'Spanish tutor. JSON only, no markdown.\n' +
    'Translate Korean to Spanish, then analyze the SPANISH grammar.\n\n' +
    'RULES:\n' +
    '- translation: ALL lines in Spanish (Latin alphabet). Preserve line breaks as \\n.\n' +
    '- native_text: More natural Spanish a native speaker would use (Latin alphabet).\n' +
    '- native_tip: 20자이내 한국어로 차이 설명.\n' +
    '- grammar[].tag: 형식 반드시 "한국어라벨 · 스페인어표현". 실제 번역된 문장의 스페인어 단어/구조를 써야 함. 한국어 문법 라벨 금지. 예시: "날씨표현 · hace viento", "목적전치사 · para pasear", "현재시제 · sopla".\n' +
    '- grammar[].desc: 해당 스페인어 문법 포인트를 한국어로 간결하게 설명. 한국어 문법 설명 금지.\n' +
    '- key_verb.infinitive: 스페인어 동사원형.\n' +
    '- key_verb.meaning: 한국어 뜻.\n\n' +
    'JSON:\n' +
    '{"translation":"스페인어번역",' +
    '"native_text":"원어민스페인어표현",' +
    '"native_tip":"차이설명",' +
    '"grammar":[{"tag":"태그 · 스페인어표현","desc":"한국어설명"},{"tag":"태그 · 스페인어표현","desc":"한국어설명"},{"tag":"태그 · 스페인어표현","desc":"한국어설명"}],' +
    '"key_verb":{"infinitive":"동사원형","meaning":"한국어뜻",' +
    '"conjugations":[{"pronoun":"yo","form":""},{"pronoun":"tú","form":""},{"pronoun":"él/ella","form":""},{"pronoun":"nosotros","form":""},{"pronoun":"vosotros","form":""},{"pronoun":"ellos","form":""}]}}\n' +
    'Korean input: ' + text;
}

function renderCorr(c) {
  if (!c) return '<span class="ph">교정 정보 없음</span>';
  var h = '';
  if (c.is_correct && (!c.errors || !c.errors.length)) {
    h += '<div class="ok-line"><div class="ok-icon">&#10003;</div>자연스러운 문장입니다</div>';
  } else if (c.errors && c.errors.length) {
    for (var i = 0; i < c.errors.length; i++) {
      var e = c.errors[i];
      if (i > 0) h += '<hr class="sep">';
      h += '<span class="chip chip-err">오류</span><div class="cv">' + e.error + '</div>';
      h += '<span class="chip chip-fix">수정</span><div class="cv">' + e.fix + '</div>';
      if (e.desc) h += '<span class="chip chip-desc">설명</span><div class="cv">' + e.desc + '</div>';
    }
    if (c.result) h += '<hr class="sep"><span class="chip chip-res">최종 교정문</span><div class="cv" style="font-weight:500">' + c.result + '</div>';
  }
  if (c.native_text) {
    h += '<div class="native-box"><div class="native-lbl">원어민 표현</div>';
    h += '<div class="native-txt">' + dedupText(c.native_text) + '</div>';
    if (c.native_sub) h += '<div class="native-sub">' + c.native_sub + '</div>';
    h += '</div>';
  }
  return h || '<span class="ph">교정 정보 없음</span>';
}

function renderGram(arr, kv) {
  var h = '<div class="gram-list">';
  if (arr && arr.length) {
    for (var i = 0; i < arr.length; i++) {
      var a = arr[i];
      if (!a || (!a.tag && !a.desc)) continue;
      h += '<div class="gram-item"><span class="gram-tag">' + (a.tag||'') + '</span><span class="gram-desc">' + (a.desc||'') + '</span></div>';
    }
  }
  h += '</div>';
  if (kv && kv.infinitive && kv.conjugations && kv.conjugations.length) {
    h += '<div class="mini-conj"><div class="mini-lbl">핵심 동사 · <b>' + kv.infinitive + '</b> ' + (kv.meaning||'') + ' 현재형</div><div class="mini-grid">';
    for (var j = 0; j < kv.conjugations.length; j++) {
      var c = kv.conjugations[j];
      h += '<div class="mini-cell"><span class="mini-pro">' + c.pronoun + '</span><span class="mini-form">' + c.form + '</span></div>';
    }
    h += '</div></div>';
  }
  return h;
}

async function doTranslate(mode) {
  var ta = document.getElementById('ta-' + mode);
  var raw = ta.value.trim();
  if (!raw) return;
  if (raw.split('\n').length > MAX_LINES) return;

  var btn = document.getElementById('btn-' + mode);
  btn.disabled = true;
  btn.innerHTML = '<div class="spin"></div>';

  // 이모지/특수문자 제거 (스페인어 특수문자는 유지)
  raw = raw.replace(/[\u{1F300}-\u{1F9FF}|\u{2600}-\u{27BF}]/gu, '').trim();
  if (!raw) { btn.disabled = false; btn.innerHTML = '번역'; return; }

  var resultEl = document.getElementById('result-' + mode);
  resultEl.style.display = 'block';

  if (mode === 'es') {
    var transEl = document.getElementById('r-trans-es');
    transEl.textContent = '번역 중...';
    setHTML('r-corr-es', '<span class="ph">분석 중...</span>');
    setHTML('r-gram-es', '<span class="ph">분석 중...</span>');
    try {
      var p = await callAPI(getESPrompt(raw), raw);
      transEl.textContent = dedupText(p.translation || '-');
      setHTML('r-corr-es', renderCorr(p.correction));
      setHTML('r-gram-es', renderGram(p.grammar, p.key_verb));
    } catch(e) {
      transEl.textContent = '오류: ' + e.message;
      setHTML('r-corr-es', '<span class="err-txt">결과를 불러올 수 없습니다</span>');
      setHTML('r-gram-es', '<span class="err-txt">결과를 불러올 수 없습니다</span>');
    }
  } else {
    var transKo = document.getElementById('r-trans-ko');
    transKo.textContent = '번역 중...';
    setHTML('r-native-ko', '');
    setHTML('r-gram-ko', '<span class="ph">분석 중...</span>');
    try {
      var p = await callAPI(getKOPrompt(raw), raw);
      transKo.textContent = dedupText(p.translation || '-');
      if (p.native_text) {
        var nb = '<div class="native-box"><div class="native-lbl">원어민 표현</div>';
        nb += '<div class="native-txt">' + dedupText(p.native_text) + '</div>';
        if (p.native_tip) nb += '<div class="native-sub">' + p.native_tip + '</div>';
        nb += '</div>';
        setHTML('r-native-ko', nb);
      }
      setHTML('r-gram-ko', renderGram(p.grammar, p.key_verb));
    } catch(e) {
      transKo.textContent = '오류: ' + e.message;
      setHTML('r-gram-ko', '<span class="err-txt">결과를 불러올 수 없습니다</span>');
    }
  }

  btn.disabled = false;
  btn.innerHTML = '번역';
}

// ── 동사 변환표 ──
async function doConjugate() {
  var verb = document.getElementById('conj-input').value.trim();
  if (!verb) return;
  var btn = document.getElementById('btn-conj');
  btn.disabled = true; btn.textContent = '...';
  document.getElementById('conj-result').innerHTML = '';

  var r6 = '[{"pronoun":"yo","form":""},{"pronoun":"tú","form":""},{"pronoun":"él/ella","form":""},{"pronoun":"nosotros","form":""},{"pronoun":"vosotros","form":""},{"pronoun":"ellos","form":""}]';
  var r2 = '[{"pronoun":"tú","form":""},{"pronoun":"vosotros","form":""}]';

  var prompt = RULE + 'Spanish conjugation expert. JSON only.\n' +
    'Input: Spanish verb infinitive.\n' +
    'Return: {"verb":"","meanings":["뜻1","뜻2","뜻3"],"verb_type":"유형 · -ar/-er/-ir형",' +
    '"nonfinite":{"past_participle":"","gerund":""},' +
    '"tenses":[' +
    '{"tense":"Presente","name_ko":"현재형","rows":' + r6 + '},' +
    '{"tense":"Pret.Indefinido","name_ko":"단순과거","rows":' + r6 + '},' +
    '{"tense":"Pret.Imperfecto","name_ko":"불완전과거","rows":' + r6 + '},' +
    '{"tense":"Futuro","name_ko":"단순미래","rows":' + r6 + '},' +
    '{"tense":"Condicional","name_ko":"조건법","rows":' + r6 + '},' +
    '{"tense":"Pret.Perfecto","name_ko":"현재완료","rows":' + r6 + '},' +
    '{"tense":"Subjuntivo","name_ko":"현재접속법","rows":' + r6 + '},' +
    '{"tense":"Imperativo","name_ko":"명령문","rows":' + r2 + '}' +
    ']}\nVerb: ' + verb;

  try {
    var p = await callAPI(prompt, verb);
    var h = '<div class="conj-card"><div class="conj-hd">';
    h += '<div class="conj-name">' + p.verb + '</div>';
    h += '<div class="conj-type">' + (p.verb_type||'') + '</div>';
    if (p.meanings && p.meanings.length) {
      h += '<div class="conj-meanings">';
      for (var i = 0; i < p.meanings.length; i++) h += '<span class="conj-badge">' + p.meanings[i] + '</span>';
      h += '</div>';
    }
    if (p.nonfinite) {
      h += '<div class="conj-nf">';
      h += '<div class="nf-item"><span class="nf-lbl">과거분사</span><span class="nf-form">' + (p.nonfinite.past_participle||'-') + '</span></div>';
      h += '<div class="nf-item"><span class="nf-lbl">동명사</span><span class="nf-form">' + (p.nonfinite.gerund||'-') + '</span></div>';
      h += '</div>';
    }
    h += '</div>';

    if (p.tenses && p.tenses.length) {
      for (var i = 0; i < p.tenses.length; i++) {
        h += renderTenseBlock(p.tenses[i], i === 0);
      }
    }
    h += '</div>';
    // 모두 펼치기 버튼
    h += '<div style="padding:12px 16px;border-top:1px solid var(--b2);text-align:center">';
    h += '<button id="expand-all-btn" onclick="toggleAllTenses()" style="font-size:12px;color:var(--teal);background:var(--tbg);border:1px solid rgba(26,107,90,0.15);padding:7px 20px;border-radius:100px;cursor:pointer;font-weight:500">모두 펼치기 ↓</button>';
    h += '</div>';
    document.getElementById('conj-result').innerHTML = h;
  } catch(e) {
    document.getElementById('conj-result').innerHTML = '<p style="color:var(--red);font-size:13px;padding:16px 0">오류: ' + e.message + '</p>';
  }
  btn.disabled = false; btn.textContent = '변환';
}

function renderTenseBlock(t, open) {
  var bodyId = 'tb-' + Math.random().toString(36).substr(2,6);
  var arrowId = 'ta-' + bodyId;
  var h = '<div class="tense-wrap">';
  h += '<div class="tense-hd" onclick="toggleTense(\'' + bodyId + '\',\'' + arrowId + '\')">';
  h += '<span class="tense-badge">' + t.tense + '</span>';
  h += '<span class="tense-name">' + t.name_ko + '</span>';
  h += '<span class="tense-arrow' + (open ? ' open' : '') + '" id="' + arrowId + '">▾</span>';
  h += '</div>';
  h += '<div class="tense-body' + (open ? ' open' : '') + '" id="' + bodyId + '">';
  h += '<div class="tense-grid">';
  for (var j = 0; j < t.rows.length; j++) {
    h += '<div class="tense-cell"><span class="tense-pro">' + t.rows[j].pronoun + '</span><span class="tense-form">' + t.rows[j].form + '</span></div>';
  }
  h += '</div></div></div>';
  return h;
}

function toggleTense(bodyId, arrowId) {
  var body = document.getElementById(bodyId);
  var arrow = document.getElementById(arrowId);
  if (body) body.classList.toggle('open');
  if (arrow) arrow.classList.toggle('open');
  updateExpandBtn();
}

function updateExpandBtn() {
  var btn = document.getElementById('expand-all-btn');
  if (!btn) return;
  var bodies = document.querySelectorAll('.tense-body');
  var allOpen = Array.prototype.every.call(bodies, function(b) { return b.classList.contains('open'); });
  btn.textContent = allOpen ? '모두 접기 ↑' : '모두 펼치기 ↓';
}

function toggleAllTenses() {
  var bodies = document.querySelectorAll('.tense-body');
  var arrows = document.querySelectorAll('.tense-arrow');
  var allOpen = Array.prototype.every.call(bodies, function(b) { return b.classList.contains('open'); });
  bodies.forEach(function(b) { b.classList.toggle('open', !allOpen); });
  arrows.forEach(function(a) { a.classList.toggle('open', !allOpen); });
  updateExpandBtn();
}
</script>
</body>
</html>
