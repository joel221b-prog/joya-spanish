<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>jOYA 스페인어 번역기</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --md-primary: #6750A4;
      --md-primary-container: #EADDFF;
      --md-on-primary-container: #21005D;
      --md-secondary: #625B71;
      --md-secondary-container: #E8DEF8;
      --md-surface: #FFFBFE;
      --md-surface-variant: #E7E0EC;
      --md-on-surface: #1C1B1F;
      --md-on-surface-variant: #49454F;
      --md-outline: #79747E;
      --md-outline-variant: #CAC4D0;
      --md-error: #B3261E;
      --md-error-container: #F9DEDC;
      --md-green: #386A20;
      --md-green-container: #C0EFA4;
      --md-blue: #0061A4;
      --md-blue-container: #D1E4FF;
      --shadow-sm: 0 1px 2px rgba(0,0,0,0.1), 0 2px 6px rgba(0,0,0,0.06);
      --shadow-md: 0 2px 8px rgba(0,0,0,0.1), 0 4px 16px rgba(0,0,0,0.06);
    }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--md-surface); color: var(--md-on-surface); min-height: 100vh; }

    .header { background: white; border-bottom: 1px solid var(--md-outline-variant); padding: 0 20px; height: 64px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 10; }
    .header-icon { width: 40px; height: 40px; background: var(--md-primary-container); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .header-title { font-size: 18px; font-weight: 700; color: var(--md-primary); }
    .header-sub { font-size: 11px; color: var(--md-on-surface-variant); margin-top: 1px; }

    .main { max-width: 560px; margin: 0 auto; padding: 24px 16px 80px; }

    .segment-wrap { display: flex; background: var(--md-surface-variant); border-radius: 28px; padding: 4px; margin-bottom: 20px; gap: 2px; }
    .seg-btn { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; padding: 10px 16px; border-radius: 24px; border: none; background: transparent; cursor: pointer; font-size: 14px; font-weight: 500; color: var(--md-on-surface-variant); font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; }
    .seg-btn.active { background: var(--md-primary); color: white; box-shadow: var(--shadow-sm); }
    .seg-btn .flag { font-size: 17px; }
    .seg-arrow { font-size: 16px; color: var(--md-on-surface-variant); display: flex; align-items: center; padding: 0 2px; }

    .input-card { background: white; border-radius: 16px; border: 1.5px solid var(--md-outline-variant); padding: 16px; transition: border-color 0.2s, box-shadow 0.2s; }
    .input-card:focus-within { border-color: var(--md-primary); box-shadow: 0 0 0 3px rgba(103,80,164,0.12); }
    .input-card textarea { width: 100%; min-height: 52px; border: none; outline: none; font-size: 15px; font-family: 'Noto Sans KR', sans-serif; color: var(--md-on-surface); background: transparent; resize: none; line-height: 1.6; overflow-y: hidden; }
    .input-card textarea::placeholder { color: var(--md-outline); }
    .input-footer { display: flex; align-items: center; justify-content: space-between; margin-top: 12px; padding-top: 10px; border-top: 1px solid var(--md-outline-variant); }
    .input-hint { font-size: 12px; color: var(--md-on-surface-variant); }
    .go-btn { display: flex; align-items: center; gap: 6px; padding: 10px 22px; background: var(--md-primary); color: white; border: none; border-radius: 28px; font-size: 14px; font-weight: 700; cursor: pointer; font-family: 'Noto Sans KR', sans-serif; transition: all 0.2s; box-shadow: var(--shadow-sm); }
    .go-btn:hover { background: #7965AF; box-shadow: var(--shadow-md); }
    .go-btn:active { transform: scale(0.97); }
    .go-btn:disabled { background: var(--md-outline-variant); box-shadow: none; cursor: default; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: white; border-radius: 50%; animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .results { display: flex; flex-direction: column; gap: 12px; opacity: 0; transition: opacity 0.3s; margin-top: 20px; }
    .results.visible { opacity: 1; }

    .card { background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-sm); }
    .card-head { padding: 12px 16px; font-size: 11.5px; font-weight: 700; letter-spacing: 0.05em; display: flex; align-items: center; gap: 6px; }
    .card-body { padding: 14px 16px; font-size: 14px; line-height: 1.75; }

    .card-translation .card-head { background: var(--md-primary-container); color: var(--md-on-primary-container); }
    .card-correction .card-head { background: var(--md-green-container); color: var(--md-green); }
    .card-examples .card-head { background: var(--md-blue-container); color: var(--md-blue); }
    .card-grammar .card-head { background: var(--md-secondary-container); color: var(--md-secondary); }

    .placeholder { color: var(--md-outline); font-size: 13px; font-style: italic; }
    .error-text { color: var(--md-error); font-size: 13px; }

    /* Correction */
    .ok-badge { display: flex; align-items: center; gap: 8px; color: var(--md-green); font-weight: 700; font-size: 14px; }
    .corr-block { margin-bottom: 12px; }
    .corr-block:last-child { margin-bottom: 0; }
    .corr-label { font-size: 11px; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; display: inline-block; margin-bottom: 5px; }
    .lbl-orig { background: #F3EDF7; color: var(--md-secondary); }
    .lbl-err { background: var(--md-error-container); color: var(--md-error); }
    .lbl-fix { background: var(--md-green-container); color: var(--md-green); }
    .lbl-desc { background: var(--md-blue-container); color: var(--md-blue); }
    .lbl-result { background: var(--md-primary-container); color: var(--md-on-primary-container); }
    .corr-text { font-size: 14px; line-height: 1.65; padding: 0 4px; margin-bottom: 6px; }
    .corr-divider { border: none; border-top: 1px solid var(--md-outline-variant); margin: 10px 0; }

    /* Examples */
    .ex-item { padding: 8px 0; border-bottom: 1px solid var(--md-outline-variant); }
    .ex-item:last-child { border-bottom: none; padding-bottom: 0; }
    .ex-es { font-size: 14px; font-weight: 700; }
    .ex-ko { font-size: 12.5px; color: var(--md-on-surface-variant); margin-top: 3px; }

    /* Grammar */
    .g-label { font-size: 11px; font-weight: 700; color: var(--md-on-surface-variant); text-transform: uppercase; letter-spacing: 0.07em; margin: 14px 0 6px; }
    .g-label:first-child { margin-top: 0; }
    .g-verb-chip { display: inline-flex; align-items: center; gap: 6px; background: var(--md-secondary-container); color: var(--md-on-primary-container); padding: 5px 14px; border-radius: 20px; font-size: 14px; font-weight: 700; margin-bottom: 8px; }
    .g-explain { font-size: 13px; line-height: 1.7; margin-bottom: 10px; }
    .conj-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 4px 10px; margin-bottom: 12px; }
    .conj-row { display: flex; gap: 8px; align-items: center; padding: 5px 8px; border-radius: 8px; background: var(--md-surface-variant); font-size: 13px; }
    .conj-pro { color: var(--md-on-surface-variant); min-width: 52px; font-size: 12px; }
    .conj-form { font-weight: 700; color: var(--md-primary); }
    .g-notes { font-size: 13px; line-height: 1.7; background: var(--md-primary-container); color: var(--md-on-primary-container); padding: 10px 14px; border-radius: 12px; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-icon">🇪🇸</div>
  <div>
    <div class="header-title">jOYA</div>
    <div class="header-sub">스페인어 공부 번역기</div>
  </div>
</header>

<main class="main">
  <div class="segment-wrap">
    <button class="seg-btn active" id="btn-es" onclick="setMode('es')"><span class="flag">🇪🇸</span> 스페인어</button>
    <span class="seg-arrow">⇄</span>
    <button class="seg-btn" id="btn-ko" onclick="setMode('ko')"><span class="flag">🇰🇷</span> 한국어</button>
  </div>

  <div class="input-card">
    <textarea id="input-text" placeholder="스페인어 문장을 입력하세요" rows="2"></textarea>
    <div class="input-footer">
      <span class="input-hint">Enter 번역 · Shift+Enter 줄바꿈</span>
      <button class="go-btn" id="go-btn" onclick="doTranslate()"><span>번역</span></button>
    </div>
  </div>

  <div class="results" id="results">
    <div class="card card-translation">
      <div class="card-head">📖 해석 (원문)</div>
      <div class="card-body" id="res-translation"><span class="placeholder">번역 결과가 여기 표시됩니다</span></div>
    </div>
    <div class="card card-correction">
      <div class="card-head">✏️ 문장 교정</div>
      <div class="card-body" id="res-correction"><span class="placeholder">교정 내용이 여기 표시됩니다</span></div>
    </div>
    <div class="card card-examples">
      <div class="card-head">💬 예제</div>
      <div class="card-body" id="res-examples"><span class="placeholder">관련 예제 문장이 여기 표시됩니다</span></div>
    </div>
    <div class="card card-grammar">
      <div class="card-head">🔤 문법 상세 (동사 변환)</div>
      <div class="card-body" id="res-grammar"><span class="placeholder">동사 변환 및 문법 설명이 여기 표시됩니다</span></div>
    </div>
  </div>
</main>

<script>
  let mode = 'es';
  const ta = document.getElementById('input-text');

  // Auto-resize
  ta.addEventListener('input', () => {
    ta.style.height = 'auto';
    ta.style.height = ta.scrollHeight + 'px';
  });

  function setMode(m) {
    mode = m;
    document.getElementById('btn-es').classList.toggle('active', m === 'es');
    document.getElementById('btn-ko').classList.toggle('active', m === 'ko');
    ta.placeholder = m === 'es' ? '스페인어 문장을 입력하세요' : '한국어 문장을 입력하세요';
  }

  function setLoading(on) {
    const btn = document.getElementById('go-btn');
    btn.disabled = on;
    btn.innerHTML = on ? '<div class="spinner"></div>' : '<span>번역</span>';
  }

  function setText(id, text) { document.getElementById(id).textContent = text; }

  function renderCorrection(c) {
    const el = document.getElementById('res-correction');
    if (!c || (c.errors && c.errors.length === 0)) {
      el.innerHTML = `<div class="ok-badge">✅ 자연스러운 문장입니다</div>`;
      return;
    }
    if (typeof c === 'string') { el.textContent = c; return; }
    let html = '';
    if (c.original) {
      html += `<div class="corr-block"><span class="corr-label lbl-orig">원문</span><div class="corr-text">${c.original}</div></div>`;
    }
    if (c.errors && c.errors.length) {
      html += `<hr class="corr-divider">`;
      c.errors.forEach((err, i) => {
        html += `<div class="corr-block">
          <span class="corr-label lbl-err">오류</span><div class="corr-text">${err.error}</div>
          <span class="corr-label lbl-fix">수정</span><div class="corr-text">${err.fix}</div>
          <span class="corr-label lbl-desc">설명</span><div class="corr-text">${err.desc}</div>
        </div>`;
        if (i < c.errors.length - 1) html += `<hr class="corr-divider">`;
      });
    }
    if (c.result) {
      html += `<hr class="corr-divider"><div class="corr-block"><span class="corr-label lbl-result">최종 교정문</span><div class="corr-text" style="font-weight:700">${c.result}</div></div>`;
    }
    el.innerHTML = html;
  }

  function renderExamples(examples) {
    const el = document.getElementById('res-examples');
    if (!examples || !examples.length) { el.innerHTML = '<span class="placeholder">예제 없음</span>'; return; }
    el.innerHTML = examples.map(e => `<div class="ex-item"><div class="ex-es">${e.es}</div><div class="ex-ko">${e.ko}</div></div>`).join('');
  }

  function renderGrammar(data) {
    const el = document.getElementById('res-grammar');
    let html = '';
    if (data && data.verbs && data.verbs.length) {
      data.verbs.forEach(v => {
        html += `<p class="g-label">동사</p>`;
        html += `<div class="g-verb-chip">${v.infinitive} <span style="font-weight:400;font-size:12px">${v.meaning}</span></div>`;
        html += `<p class="g-explain">${v.explanation}</p>`;
        if (v.conjugations && v.conjugations.length) {
          html += `<div class="conj-grid">`;
          v.conjugations.forEach(c => {
            html += `<div class="conj-row"><span class="conj-pro">${c.pronoun}</span><span class="conj-form">${c.form}</span></div>`;
          });
          html += `</div>`;
        }
      });
    }
    if (data && data.notes) {
      html += `<p class="g-label">문법 노트</p><div class="g-notes">${data.notes}</div>`;
    }
    el.innerHTML = html || '<span class="placeholder">동사 정보 없음</span>';
  }

  async function doTranslate() {
    const rawText = ta.value.trim();
    if (!rawText) return;

    // 이모지 보존 처리
    const emojiMap = {};
    let idx = 0;
    const safeText = rawText.replace(/(\p{Emoji_Presentation}|\p{Extended_Pictographic})/gu, match => {
      const key = `EMOJI${idx++}`;
      emojiMap[key] = match;
      return key;
    });

    setLoading(true);
    document.getElementById('results').classList.add('visible');
    setText('res-translation', '분석 중...');
    document.getElementById('res-correction').innerHTML = '<span class="placeholder">분석 중...</span>';
    document.getElementById('res-examples').innerHTML = '<span class="placeholder">로딩 중...</span>';
    document.getElementById('res-grammar').innerHTML = '<span class="placeholder">로딩 중...</span>';

    const isES = mode === 'es';
    const systemPrompt = `You are a Spanish language tutor. Respond ONLY in valid JSON. No markdown, no code blocks.

User inputs a ${isES ? 'Spanish' : 'Korean'} sentence.

Return exactly:
{
  "translation": "${isES ? 'Korean translation' : 'Spanish translation'}",
  "correction": {
    "original": "original text",
    "errors": [{"error": "Korean error description", "fix": "corrected part", "desc": "Korean explanation"}],
    "result": "corrected sentence (same as original if no errors)"
  },
  "examples": [
    {"es": "Spanish sentence", "ko": "Korean"},
    {"es": "Spanish sentence 2", "ko": "Korean 2"},
    {"es": "Spanish sentence 3", "ko": "Korean 3"}
  ],
  "grammar": {
    "verbs": [{
      "infinitive": "infinitive",
      "meaning": "Korean meaning",
      "explanation": "Korean tense/mood explanation",
      "conjugations": [
        {"pronoun": "yo", "form": "..."},
        {"pronoun": "tú", "form": "..."},
        {"pronoun": "él/ella", "form": "..."},
        {"pronoun": "nosotros", "form": "..."},
        {"pronoun": "vosotros", "form": "..."},
        {"pronoun": "ellos", "form": "..."}
      ]
    }],
    "notes": "Korean grammar notes"
  }
}`;

    try {
      const resp = await fetch('/.netlify/functions/translate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: systemPrompt,
          messages: [{ role: 'user', content: safeText }]
        })
      });

      const data = await resp.json();
      if (data.error) throw new Error(data.error);

      let raw = data.content.map(b => b.text || '').join('');
      Object.entries(emojiMap).forEach(([k, v]) => { raw = raw.split(k).join(v); });

      const clean = raw.replace(/```json|```/g, '').trim();
      const parsed = JSON.parse(clean);

      setText('res-translation', parsed.translation || '-');
      renderCorrection(parsed.correction);
      renderExamples(parsed.examples || []);
      renderGrammar(parsed.grammar || {});

    } catch (e) {
      setText('res-translation', '오류: ' + e.message);
      document.getElementById('res-correction').innerHTML = '<span class="error-text">결과를 불러올 수 없습니다</span>';
      document.getElementById('res-examples').innerHTML = '<span class="error-text">결과를 불러올 수 없습니다</span>';
      document.getElementById('res-grammar').innerHTML = '<span class="error-text">결과를 불러올 수 없습니다</span>';
    } finally {
      setLoading(false);
    }
  }

  ta.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); doTranslate(); }
  });
</script>
</body>
</html>
